<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vokabel-Sommer-Booster</title>
<style>
:root{
  --bg-page:#FBF7F0; --bg-surface:#F1EADD; --color-heading:#3E322A; --color-text:#2A2320;
  --color-muted:#9B9085; --color-border:#E2D9C9;
  --accent:#7E3B34; --accent-hover:#6A312B; --on-accent:#FFFFFF; --accent-tint:#EFDAD6;
  --secondary:#7E3B34; --secondary-hover:#6A312B; --on-secondary:#FFFFFF; --secondary-tint:#F3E7E4;
  --font-base:-apple-system,"Helvetica Neue",Arial,system-ui,sans-serif; --lh-body:1.55; --lh-tight:1.15;
  --radius-sm:10px; --radius-md:14px; --space-1:8px; --space-2:16px; --space-3:24px; --space-4:40px; --maxw:560px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg-page);color:var(--color-text);font-family:var(--font-base);line-height:var(--lh-body);padding-bottom:var(--space-3);}
/* Desktop: luftiger und größer */
@media (min-width:900px){
  html{font-size:18px;}
  :root{--maxw:780px;--space-1:10px;--space-2:22px;--space-3:36px;--space-4:56px;--radius-md:16px;}
  header.app h1{font-size:1.2rem;}
  .nav button{padding:10px 16px;font-size:.9rem;}
}
.wrap{max-width:var(--maxw);margin:0 auto;padding:var(--space-2);}
header.app{max-width:var(--maxw);margin:0 auto;padding:var(--space-2) var(--space-2) 0;}
header.app .brand{display:flex;align-items:center;justify-content:space-between;gap:var(--space-1);}
header.app h1{font-size:1.05rem;color:var(--color-heading);margin:0;line-height:var(--lh-tight);}
.nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
@media (max-width:560px){
  header.app .brand{flex-wrap:wrap;}
  .nav{justify-content:flex-start;width:100%;}
  .nav button{padding:7px 10px;font-size:.8rem;}
}
.nav button{padding:8px 12px;font-size:.85rem;background:transparent;color:var(--accent);border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;}
.nav button:hover{background:var(--accent-tint);}
h1,h2,h3{color:var(--color-heading);line-height:var(--lh-tight);}
.muted{color:var(--color-muted);}
.card{background:var(--bg-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-3);margin-bottom:var(--space-2);}
button{font-family:inherit;font-size:1rem;cursor:pointer;border-radius:var(--radius-sm);border:1px solid transparent;padding:12px 18px;}
.btn{background:var(--accent);color:var(--on-accent);border-color:var(--accent);}
.btn:hover{background:var(--accent-hover);}
.btn.sec{background:var(--secondary);color:var(--on-secondary);border-color:var(--secondary);}
.btn.sec:hover{background:var(--secondary-hover);}
.btn.ghost{background:transparent;color:var(--accent);border-color:var(--color-border);}
.btn.ghost:hover{background:var(--accent-tint);}
.btn.block{display:block;width:100%;margin-top:var(--space-2);}
.btn.small{padding:8px 12px;font-size:.9rem;}
.row{display:flex;gap:var(--space-1);flex-wrap:wrap;}
.opts{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 var(--space-3);}
.opt{border:1px solid var(--color-border);background:#fff;border-radius:var(--radius-sm);padding:10px 14px;cursor:pointer;}
.opt.active{background:var(--accent-tint);border-color:var(--accent);color:var(--accent);font-weight:600;}
label.fld{display:block;font-weight:600;margin-top:var(--space-3);color:var(--color-heading);}
.pill{display:inline-block;padding:3px 12px;border-radius:999px;font-size:.8rem;background:#FAF5E9;border:1px solid var(--accent);color:var(--color-heading);}
.pill.neu,.pill.ueb,.pill.sic{background:#FAF5E9;color:var(--color-heading);}
.status{width:calc(100% - 2*var(--space-2));max-width:calc(var(--maxw) - 2*var(--space-2));margin:0 auto var(--space-3);background:var(--bg-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:12px var(--space-2);}
.status:empty{display:none;}
.status .statusbox{max-width:var(--maxw);margin:0 auto;}
.blabel{display:flex;justify-content:space-between;font-size:.78rem;color:var(--color-muted);margin:2px 0;}
.bar{height:9px;background:var(--color-border);border-radius:999px;overflow:hidden;}
.bar>div{height:100%;background:var(--accent);width:0;transition:width .3s;}
.bar.sec>div{background:var(--secondary);}
.ringwrap{display:flex;align-items:center;gap:var(--space-2);}
.ring{--p:0;width:84px;height:84px;border-radius:50%;border:2px solid var(--accent);background:conic-gradient(var(--accent) calc(var(--p)*1%), var(--color-border) 0);display:grid;place-items:center;flex:0 0 auto;}
.ring>div{width:64px;height:64px;border-radius:50%;background:var(--bg-surface);display:grid;place-items:center;font-weight:700;color:var(--color-heading);}
.prompt{font-size:1.7rem;font-weight:700;color:var(--color-heading);text-align:center;margin:var(--space-2) 0;}
.ex{font-style:italic;color:var(--secondary);text-align:center;margin-bottom:var(--space-2);}
.answer{font-size:1.4rem;text-align:center;color:var(--accent);font-weight:700;margin:var(--space-2) 0;}
input[type=text]{width:100%;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-sm);font-size:1.1rem;font-family:inherit;}
.hidden{display:none!important;}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2);}
.banner{background:#FAF5E9;border:1px solid var(--color-border);border-left:4px solid var(--accent);border-radius:0;padding:var(--space-2);margin:var(--space-3) 0;}
.banner+.btn.block,.banner+.banner{margin-top:var(--space-3);}
.info{background:#fff;border:1px solid var(--color-border);border-left:4px solid var(--accent);border-radius:0;padding:12px 14px;font-size:1rem;color:var(--color-text);margin:var(--space-3) 0;}
table.plan{width:100%;border-collapse:collapse;font-size:.9rem;}
table.plan th,table.plan td{border:1px solid var(--color-border);padding:6px 8px;text-align:left;}
table.plan th{background:var(--accent);color:#FFFFFF;}
table.plan tr.today td{background:var(--accent-tint);font-weight:600;}
canvas#cf{position:fixed;inset:0;pointer-events:none;z-index:50;}
.warn{background:#F7ECD8;border:1px solid #E4C98A;color:#6B4E1E;border-radius:var(--radius-sm);padding:10px 12px;margin:10px 0;}
.small{font-size:.85rem;}
@media print{header.app,.nav,.noprint,.status{display:none!important}body{background:#fff;padding-bottom:0}.card{border:1px solid #ccc}}
</style>
</head>

<main class="wrap" id="app"></main>

  if(fixed&&S.settings&&S.plan&&S.plan.start===todayISO()){ S.newLog={}; const n=S.plan.idxOrder.filter(i=>cardState(i).seen).length; if(n>0)S.newLog[todayISO()]=n; saveState(); }
  else if(fixed){ saveState(); } }
function saveState(){ if(PID&&S) localStorage.setItem(stateKey(),JSON.stringify(S)); }
function weekNo(){ const d=new Date(); return d.getFullYear()*53+Math.floor((d-new Date(d.getFullYear(),0,1))/6048e5); }
function freshState(){ return {settings:null,plan:null,cards:{},streak:0,freeze:1,freezeWeek:weekNo(),lastDate:null,done:{},bonus:{},newLog:{},shownMiles:[],corrections:[],calib:{ms:0,n:0},expand:false}; }

// Data
function fullList(){ return VOCAB[S.settings.level]; }
function activeIdx(){ const arr=fullList(); const idx=[]; arr.forEach((w,i)=>{ if(w.pk==="K"||(S.settings.scope==="E"&&w.pk==="E")) idx.push(i); }); return idx; }
function bonusIdx(){ const arr=fullList(); const idx=[]; arr.forEach((w,i)=>{ if(w.pk==="B") idx.push(i); }); return idx; }
function bonusStats(){ const b=bonusIdx(); let sic=0,seen=0; b.forEach(i=>{ const cs=cardState(i); if(cs.seen)seen++; if(mastery(cs)==="sicher")sic++; }); return {total:b.length,seen,sicher:sic}; }
// Extra-Pool fürs Mehr-Lernen: bei Kern zuerst die 150 Erweiterungs-Wörter, danach Bonus; bei Erweitert direkt Bonus
function extraIdx(){ const arr=fullList(); const idx=[]; arr.forEach((w,i)=>{ if((S.settings.scope==="K"&&w.pk==="E")||w.pk==="B") idx.push(i); }); return idx; }
function extraStats(){ const b=extraIdx(); let sic=0,seen=0; b.forEach(i=>{ const cs=cardState(i); if(cs.seen)seen++; if(mastery(cs)==="sicher")sic++; }); return {total:b.length,seen,sicher:sic}; }
function dir(){ return S.settings.dir; }
function ckey(i){ return S.settings.level+":"+i; }
function cardState(i){ const k=ckey(i); if(!S.cards[k])S.cards[k]={}; if(!S.cards[k][dir()])S.cards[k][dir()]={seen:false,box:0,due:0}; return S.cards[k][dir()]; }
function mastery(cs){ if(!cs.seen||cs.box===0)return "neu"; if(cs.box>=3)return "sicher"; return "ueben"; }

// Calendar helpers
function isLD(daysPerWeek,wday){ return (daysPerWeek===7)||(daysPerWeek===6&&wday!==0)||(daysPerWeek===5&&wday!==0&&wday!==6); }
function makeDates(start,daysPerWeek,count){ const out=[]; let d=new Date(start+"T00:00"); while(out.length<count){ if(isLD(daysPerWeek,d.getDay())) out.push(new Date(d.getTime()-d.getTimezoneOffset()*6e4).toISOString().slice(0,10)); d=new Date(d.getTime()+DAY); } return out; }
function dayIndex(){ if(!S.plan)return -1; const t=todayISO(); let idx=-1; S.plan.dates.forEach((d,i)=>{ if(d<=t) idx=i; }); return idx; }
function isLearningToday(){ return S.plan&&S.plan.dates.includes(todayISO()); }
function di0(){ const d=dayIndex(); return d<0?0:d; }
function minLD(){ return 2*S.settings.days; } // min 2 Wochen × Lerntage/Woche

// Pace model
function avgSec(){ return (S.calib&&S.calib.n>=5)? Math.max(6,S.calib.ms/S.calib.n/1000) : 22; }
function dailyBudget(){ return Math.max(6,Math.min(220,Math.round(S.settings.minutes*60/avgSec()))); }
function introducedCount(){ return S.plan.idxOrder.filter(i=>cardState(i).seen).length; }
function newPerDayEst(){ const el=di0()+1; const intro=introducedCount(); if(intro>0) return Math.max(1,Math.round(intro/el)); return Math.max(1,dailyBudget()); }
function projectedTotalLD(){ return Math.max(minLD(), Math.ceil(S.plan.total/newPerDayEst())); }
function projectedEndDate(){ const n=projectedTotalLD(); const ds=makeDates(S.plan.start,S.settings.days,n); return ds[ds.length-1]; }
// Tempo-Prognosen erst, wenn wirklich gelernt wurde UND mindestens ein Durchlauf abgeschlossen ist
function hasLearnHistory(){ return introducedCount()>0 && Object.keys(S.done).length>0; }

  else{ const q=buildQueue(); const t=q.due.length+q.news.length; const done=!!S.done[todayISO()]; pct=done?100:(t?0:100); label=done?"geschafft ✓":(t?t+" offen":"nichts fällig"); }
  el.innerHTML=`<div class="statusbox">

  </div>`;
}

function buildPlan(keepStart){
  const total=activeIdx().length; const start=(keepStart&&S.plan)?S.plan.start:todayISO();
  const LD=Math.max(minLD(), S.settings.weeks*S.settings.days);
  S.plan={start,dates:makeDates(start,S.settings.days,LD),total,idxOrder:activeIdx()};
}

// Queue (pace-based)
function buildQueue(extra){
  const di=di0(); const order=S.plan.idxOrder; const unlocked=fullListSicher(); const expand=!!S.expand;
  // Wiederholungen haben immer Vorrang – über ALLE jemals gelernten Karten (Paket, Erweiterung, Bonus)
  const due=[]; const n=fullList().length;
  for(let i=0;i<n;i++){ const k=ckey(i); const c=S.cards[k]&&S.cards[k][dir()]; if(c&&c.seen&&c.due<=di) due.push(i); }
  // Nachschub-Reihenfolge: eigenes Paket → (bei Kern) Erweiterungs-Wörter → Bonusliste
  const corePool=order.filter(i=>!cardState(i).seen);
  const extraPool=(expand||unlocked)? extraIdx().filter(i=>!cardState(i).seen) : [];
  const notSeen=corePool.concat(extraPool);
  const learnedToday=S.newLog[todayISO()]||0;
  const base=(isLearningToday()||unlocked)? dailyBudget() : 0; // an Nicht-Lerntagen nur per Extra-Kontingent („Trotzdem weiter lernen")
  const timeLeft=Math.max(0, base-learnedToday-due.length);
  // Plan-Deckelung (nur ohne Mehr-Lernen-Modus): Restwörter gleichmäßig auf verbleibende Plantage
  const daysLeft=Math.max(1, S.plan.dates.filter(d=>d>=todayISO()).length);
  const share=Math.ceil((corePool.length+learnedToday)/daysLeft);
  const planLeft=(unlocked||expand)? timeLeft : Math.max(0, share-learnedToday);
  // extra = einmaliges Kontingent nur für die jetzt gestartete Übung (stapelt sich nicht)
  const newCount=Math.min(Math.min(timeLeft,planLeft)+(extra||0), notSeen.length);
  return {due,news:notSeen.slice(0,newCount)};
}

// Plan overview (projection)
function screenPlan(){
  const p=S.plan; const di=dayIndex(); const est=newPerDayEst(); const projEnd=projectedEndDate(); const projLD=projectedTotalLD();
  const plannedEnd=p.dates[p.dates.length-1];
  const remaining=p.total-introducedCount();
  let cum=0, estShow=null;
  const rows=p.dates.map((dt,i)=>{ const past=i<di||(i===di&&S.done[dt]);
    let n; if(past){ n=S.newLog[dt]||0; }
    else { const left=p.dates.length-i; const rem=Math.max(0,p.total-cum); n=Math.min(dailyBudget(),Math.ceil(rem/left)); if(estShow===null)estShow=n; }
    cum+=n; return `<tr class="${dt===todayISO()?"today":""}"><td>Tag ${i+1}</td><td>${fmt(dt)}</td><td>${past?n:"~"+n}</td><td>${past?cum:"~"+cum}</td></tr>`; }).join("");
  if(estShow===null)estShow=est;
  let note="";
  if(remaining<=0){ const stp=stats(); const open=stp.totalTracked-stp.sicher;
    note= todayISO()>plannedEnd
      ? (open>0? `<div class="banner">🧱 Lernphase beendet – Festigungsphase läuft: noch <b>${open}</b> ${open===1?"Wort":"Wörter"} auf dem Weg zu „sicher". Übe täglich kurz weiter, bis alles sitzt.</div>` : `<div class="banner">🎉 Alle Wörter sind „sicher" – Plan abgeschlossen! Wenn du magst, erweitere deinen Wortschatz.</div>`)
      : `<div class="banner">Alle Wörter sind eingeführt – jetzt festigen bis ${fmt(plannedEnd)}. Wenn du magst, erweitere deinen Wortschatz.</div>`; }
  else if(S.expand){ note=`<div class="banner">🚀 <b>Mehr-Lernen-Modus aktiv:</b> Dein Tempo bestimmt dein Tagespensum. Extra-Wörter kommen automatisch dazu ${S.settings.scope==="K"?"(zuerst die 150 Erweiterungs-Wörter deiner Stufe, danach der Bonus-Wortschatz)":"(aus dem Bonus-Wortschatz deiner Stufe)"} – die Wiederholungen deines Pakets laufen dabei immer zuerst, bis alles „sicher" ist.<div class="row" style="margin-top:var(--space-2)"><button class="btn ghost small" id="expoff">Modus beenden</button></div></div>`; }
  else if(hasLearnHistory()&&Math.ceil(p.total/newPerDayEst())<p.dates.length){ const rawLD=Math.ceil(p.total/newPerDayEst()); const introEnd=p.dates[Math.max(0,Math.min(rawLD,p.dates.length)-1)]; const canShorten=projLD<p.dates.length;
    note=`<div class="banner">🚀 Bei deinem Tempo hast du voraussichtlich schon am <b>${fmt(introEnd)}</b> alle Wörter durch – früher als geplant. Was möchtest du?<div class="row" style="margin-top:var(--space-2)">${canShorten?`<button class="btn small" id="fit">Plan verkürzen</button>`:``}<button class="btn sec small" id="expon">Mehr Wörter in gleicher Zeit</button></div></div>`; }
  else if(hasLearnHistory()){ const daysLeftP=Math.max(1,p.dates.filter(d=>d>=todayISO()).length); const need=Math.ceil(remaining/daysLeftP);
    if(dailyBudget()<need){ const nLD=Math.max(minLD(),Math.ceil(p.total/Math.max(1,dailyBudget()))); const ds=makeDates(p.start,S.settings.days,nLD);
      note=`<div class="warn">Mit deiner Lernzeit (${S.settings.minutes} Min/Tag) brauchst du eher bis <b>${fmt(ds[ds.length-1])}</b>. Das ist ok – verteiltes Lernen bleibt besser hängen. Tipp: Unter „Anpassen" kannst du die tägliche Lernzeit erhöhen.</div>`; } }
  show(`<div class="card">${greetHtml()}<div class="top"><h2>Dein Lernplan</h2><span class="pill">${LEVEL_LABEL[S.settings.level]}</span></div>
  <p class="small muted">${S.settings.scope==="E"?"Erweitert (450)":"Kern (300)"} · ${S.settings.weeks} Wochen · ${S.settings.days} Lerntage/Woche · ${S.settings.minutes} Min/Tag · ${S.settings.dir==="en2de"?"EN→DE":"DE→EN"} · ~${estShow} neue/Tag geplant</p>
  ${note}
  <table class="plan"><thead><tr><th>Lerntag</th><th>Datum</th><th>Neue Wörter</th><th>Gesamt</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="row noprint" style="margin-top:var(--space-3)"><button class="btn" id="go">Heute üben →</button><button class="btn ghost" id="prn">Drucken</button><button class="btn ghost" id="adj">Anpassen</button><button class="btn ghost" id="back">Zurück</button></div></div>`);
  $("#go").onclick=screenHome; $("#prn").onclick=()=>window.print(); $("#adj").onclick=screenAdjust; $("#back").onclick=screenHome;
  const fit=$("#fit"); if(fit)fit.onclick=adjustToPace;
  const expon=$("#expon"); if(expon)expon.onclick=()=>{ S.expand=true; saveState(); alert("Mehr-Lernen-Modus ist an: Dein Tagespensum richtet sich jetzt nach deinem Tempo, Extra-Wörter kommen automatisch dazu. Die Wiederholungen deines Pakets laufen immer zuerst weiter."); screenPlan(); };
  const expoff=$("#expoff"); if(expoff)expoff.onclick=()=>{ S.expand=false; saveState(); screenPlan(); };
}
function adjustToPace(){ const n=projectedTotalLD(); S.plan.dates=makeDates(S.plan.start,S.settings.days,n); saveState();
  if(n===minLD()) alert("Kürzer als 2 Wochen / 5 Lerntage pro Woche geht bewusst nicht. Nutze die Zeit zum Festigen und Wiederholen – oder erweitere deinen Wortschatz (Anpassen → Erweitert / andere Stufe).");
  screenPlan(); }

      <p class="small muted" style="margin:6px 0 0">von ${st.totalTracked} Wörtern (${S.settings.dir==="en2de"?"EN→DE":"DE→EN"})</p></div>
    </div>
    ${fullListSicher()?(()=>{const b=extraStats();return `<div class="banner">🏅 <b>Bonus-Wortschatz freigeschaltet!</b> Du hast dein Paket gemeistert – ${b.total} Extra-Wörter deiner Stufe warten (die häufigsten zuerst). Ganz ohne Pflicht: Dein Plan bleibt geschafft. Bisher: ${b.seen}/${b.total} begonnen · ${b.sicher} sicher.</div>`;})():(S.expand?(()=>{const b=extraStats();return `<div class="banner">🚀 <b>Mehr-Lernen-Modus:</b> Dein Tempo bestimmt das Pensum – Extra-Wörter kommen automatisch dazu, Wiederholungen deines Pakets laufen immer zuerst.${b.seen>0?` Extra bisher: ${b.seen} begonnen · ${b.sicher} sicher.`:""}</div>`;})():"")}
    <div class="info"><b>Wie wird ein Wort „sicher"?</b><br>Erst wenn du es an mehreren Tagen richtig erinnerst – mit größer werdenden Abständen. Dann rutscht es auch vom Kurzzeit- ins Langzeitgedächtnis und bleibt sicher im Gedächtnis.</div>
    ${ (doneToday||nothing)
      ? `<div class="banner">${nothing&&!doneToday?"Für heute ist nichts fällig. ":""}${doneToday?"🎉 Für heute geschafft! ":""}${pep("day")}</div>
         ${speedBanner}
         <button class="btn block" id="more">Trotzdem weiter lernen</button>`
      : `<p>Heute dran: <b>${q.news.length} neue</b> + <b>${q.due.length} Wiederholungen</b> <span class="small muted">(dein Tagespensum ${S.expand?"nach deinem Tempo":"laut Plan"} – mit „Trotzdem weiter lernen" geht jederzeit mehr)</span>.</p>
         <div class="opts" id="mode"><div class="opt active" data-v="rec">Erkennen</div><div class="opt" data-v="type">Eintippen</div></div>
         <button class="btn block" id="start">Üben starten ▶</button>` }
    <div class="row noprint" style="margin-top:var(--space-3)"><button class="btn ghost small" id="planbtn">Lernplan</button><button class="btn ghost small" id="adj">Tempo/Umfang anpassen</button></div>
  </div>`);
  let mode="rec";
  if(!(doneToday||nothing)){ app.querySelectorAll("#mode .opt").forEach(o=>o.onclick=()=>{app.querySelectorAll("#mode .opt").forEach(x=>x.classList.remove("active"));o.classList.add("active");mode=o.dataset.v;});
    $("#start").onclick=()=>startSession(q,mode); }
  else { $("#more").onclick=()=>{ const q2=buildQueue(Math.max(6,Math.round(dailyBudget()/2))); if(q2.due.length+q2.news.length===0){alert("Super – aktuell ist alles gelernt und nichts fällig!");return;} startSession(q2,"rec"); }; }
  const hfit=$("#hfit"); if(hfit)hfit.onclick=adjustToPace;
  const hexp=$("#hexp"); if(hexp)hexp.onclick=()=>{ S.expand=true; saveState(); alert("Mehr-Lernen-Modus ist an: Dein Tagespensum richtet sich jetzt nach deinem Tempo, Extra-Wörter kommen automatisch dazu. Die Wiederholungen deines Pakets laufen immer zuerst weiter."); screenHome(); };
  $("#planbtn").onclick=screenPlan; $("#adj").onclick=screenAdjust;
}

// Adjust
function screenAdjust(){ const s=S.settings;
  show(`<div class="card">${greetHtml()}<h2>Anpassen</h2><p class="small muted">Änderungen behalten deinen Fortschritt.</p>
  <label class="fld">Klassenstufe <span class="small muted">(Wechsel startet einen neuen Plan – dein Fortschritt je Stufe bleibt gespeichert)</span></label>
  <div class="opts" id="aLevel">${Object.keys(LEVEL_LABEL).map(lv=>`<div class="opt ${s.level===lv?"active":""}" data-v="${lv}">${LEVEL_LABEL[lv]}</div>`).join("")}</div>
  <label class="fld">Tägliche Lernzeit</label><div class="opts" id="aMin">${[15,20,30,45].map(m=>`<div class="opt ${s.minutes===m?"active":""}" data-v="${m}">${m} Min</div>`).join("")}</div>
  <label class="fld">Zeitraum <span class="small muted">(min. 2 Wochen)</span></label><div class="opts" id="aWeeks">${[2,3].map(w=>`<div class="opt ${s.weeks===w?"active":""}" data-v="${w}">${w} Wochen</div>`).join("")}</div>
  <label class="fld">Lerntage pro Woche <span class="small muted">(min. 5)</span></label><div class="opts" id="aDays">${[5,6,7].map(w=>`<div class="opt ${s.days===w?"active":""}" data-v="${w}">${w}</div>`).join("")}</div>
  <div class="info">Kürzer als 2 Wochen / 5 Tage geht bewusst nicht – verteiltes Lernen bleibt am besten hängen. Schneller kommst du über mehr Zeit pro Tag oder „Trotzdem weiter lernen" voran.</div>
  <label class="fld">Mehr Inhalt</label>
  ${s.scope==="K"?`<button class="btn sec block" id="expand">Auf Erweitert (450) aufstocken – Fortschritt bleibt</button>`:`<p class="small muted">Du lernst bereits das erweiterte Paket (450).</p>`}
  <button class="btn block" id="save" style="margin-top:var(--space-3)">Übernehmen</button>
  <button class="btn ghost block" id="back">Zurück</button></div>`);
  const sel={minutes:s.minutes,weeks:s.weeks,days:s.days,level:s.level};
  function bind(id,key,num){ app.querySelectorAll("#"+id+" .opt").forEach(o=>o.onclick=()=>{ app.querySelectorAll("#"+id+" .opt").forEach(x=>x.classList.remove("active")); o.classList.add("active"); sel[key]=num?+o.dataset.v:o.dataset.v; }); }
  bind("aMin","minutes",true);bind("aWeeks","weeks",true);bind("aDays","days",true);bind("aLevel","level",false);
  $("#save").onclick=()=>{ const lvChanged=sel.level!==S.settings.level;
    S.settings.minutes=sel.minutes; S.settings.weeks=sel.weeks; S.settings.days=sel.days;
    if(lvChanged){ if(!confirm(LEVEL_LABEL[sel.level]+" wählen? Es startet ein neuer Plan – dein bisheriger Fortschritt bleibt für jede Stufe gespeichert.")){ return; } S.settings.level=sel.level; buildPlan(); }
    else buildPlan(true);
    saveState(); screenPlan(); };
  const ex=$("#expand"); if(ex)ex.onclick=()=>{ S.settings.scope="E"; buildPlan(true); saveState(); alert("Erweitert – die zusätzlichen Wörter sind eingeplant, dein Fortschritt bleibt erhalten."); screenPlan(); };
  $("#back").onclick=()=> (S.settings&&S.plan)?screenHome():route();
}

// Session
let SESS=null;
function startSession(q,mode){
  const queue=[...q.due, ...q.news]; // Neue Wörter werden erst beim tatsächlichen Üben gezählt (siehe grade)
  for(let k=queue.length-1;k>0;k--){ const j=Math.floor(Math.random()*(k+1)); [queue[k],queue[j]]=[queue[j],queue[k]]; }
  SESS={queue,target:queue.length,done:0,mode,wrong:{}};
  saveState(); nextCard();
}
function nextCard(){
  if(SESS.queue.length===0){ endSession(); return; }
  const i=SESS.queue[0]; const w=fullList()[i];
  const askEN=dir()==="en2de"; const prompt=askEN?w.en:w.de, solution=askEN?w.de:w.en;
  const phrase=/\.\.\.|[?!.]$/.test(w.en)||w.en.split(" ").length>3;
  SESS.t0=performance.now();
  const pct=Math.round(SESS.done/Math.max(1,SESS.target)*100);
  let body=(SESS.mode==="type"&&!phrase)
    ? `<input type="text" id="ans" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Antwort eintippen…"><button class="btn block" id="check">Prüfen</button>`
    : `<button class="btn block" id="reveal">Auflösen</button>`;
  show(`<div class="card">
    <div class="top"><button class="btn ghost small" id="stop">Beenden</button><span class="small muted">Heute ${SESS.done}/${SESS.target}</span></div>
    <div class="bar"><div style="width:${pct}%"></div></div>
    <div class="prompt">${esc(prompt)}</div>
    ${askEN?`<div class="ex">${esc(w.ex||"")}</div>`:``}
    <div id="slot">${body}</div>
    <div style="text-align:center;margin-top:12px"><a href="#" id="flag" class="small muted">✎ Korrektur melden</a></div>
  </div>`);
  $("#stop").onclick=()=>{ SESS=null; screenHome(); };
  $("#flag").onclick=(e)=>{ e.preventDefault(); const note=window.prompt("Was stimmt nicht? (z. B. Beispielsatz falsch, Übersetzung fehlt …)\n\nWort: "+w.en+" = "+w.de,""); if(note&&note.trim()){ (S.corrections=S.corrections||[]).push({en:w.en,de:w.de,ex:w.ex,note:note.trim(),level:S.settings.level,dir:dir(),date:todayISO()}); saveState(); alert("Danke, notiert! Die Meldungen findest du unter: Fortschritt → Korrekturen exportieren."); } };
  if(SESS.mode==="type"&&!phrase){ const inp=$("#ans"); inp.focus(); const go=()=>revealResult(i,w,solution,matches(inp.value,solution),askEN,inp.value); inp.addEventListener("keydown",e=>{ if(e.key==="Enter")go(); }); $("#check").onclick=go; }
  else { $("#reveal").onclick=()=>revealResult(i,w,solution,null,askEN,null); }
}
function revealResult(i,w,solution,typedOk,askEN,typedVal){
  if(SESS.t0){ S.calib.ms+=performance.now()-SESS.t0; S.calib.n++; }
  const exHtml=!askEN?`<div class="ex">${esc(w.ex||"")}</div>`:``;
  let head=""; if(typedOk===true)head=`<p class="answer">✓ Richtig</p>`; else if(typedOk===false)head=`<p class="answer" style="color:var(--secondary)">Deine Antwort: ${esc(typedVal||"—")}</p>`;
  $("#slot").innerHTML=`${head}<div class="answer">${esc(solution)}</div>${exHtml}
    <div class="row" style="margin-top:8px"><button class="btn sec block" id="again">✗ Nochmal</button><button class="btn block" id="know">✓ Gewusst</button></div>`;
  $("#know").onclick=()=>grade(i,true); $("#again").onclick=()=>grade(i,false);
}
function grade(i,correct){
  const cs=cardState(i); const di=di0(); SESS.queue.shift();
  if(!cs.seen){ cs.seen=true; S.newLog[todayISO()]=(S.newLog[todayISO()]||0)+1; }
  if(correct){ cs.box=Math.min(3,(cs.box||0)+1); cs.due=di+(INTERVAL[cs.box]||7); SESS.done++; }
  else{ cs.box=Math.max(1,cs.box||0); const wc=(SESS.wrong[i]||0)+1; SESS.wrong[i]=wc;
    if(wc<2){ SESS.queue.push(i); SESS.target++; } else { cs.due=di+1; SESS.done++; } }
  saveState(); nextCard();
}
function endSession(){
  S.done[todayISO()]=true; updateStreak();
  const sic=stats().sicher; let crossed=null; MILES.forEach(m=>{ if(sic>=m && !S.shownMiles.includes(m)){ S.shownMiles.push(m); crossed=(crossed==null?m:Math.max(crossed,m)); } });
  const allDone=fullListSicher();
  const newT=S.newLog[todayISO()]||0; const tooMuch = newT>=40;
  saveState(); confetti();
  let msg = allDone? pep("plan") : (crossed!=null? pep("mile",crossed) : (tooMuch? pep("much") : pep("day")));
  SESS=null;
  show(`<div class="card"><h2>${allDone?"🎉 Plan abgeschlossen!":"🎉 Für heute geschafft!"}</h2>
    <div class="banner">${msg}</div>
    <button class="btn block" id="ok">Zur Startseite</button>
    ${allDone?`<button class="btn sec block" id="next">Mehr lernen: erweitern oder Stufe wechseln</button>`:``}
  </div>`);
  $("#ok").onclick=screenHome; if(allDone)$("#next").onclick=screenAdjust;
}
function updateStreak(){ const today=todayISO(); if(S.lastDate===today)return;
  if(weekNo()!==S.freezeWeek){ S.freeze=1; S.freezeWeek=weekNo(); }
  if(!S.lastDate)S.streak=1; else{ const g=Math.round((new Date(today)-new Date(S.lastDate))/DAY); if(g===1)S.streak++; else if(g===2&&S.freeze>0){S.streak++;S.freeze--;} else S.streak=1; }
  S.lastDate=today; }

// Stats
function stats(){ const order=activeIdx(); let neu=0,ueb=0,sic=0; order.forEach(i=>{ const m=mastery(cardState(i)); if(m==="neu")neu++; else if(m==="ueben")ueb++; else sic++; });
  return {neu,ueben:ueb,sicher:sic,totalTracked:order.length,pct:Math.round(sic/Math.max(1,order.length)*100)}; }
function fullListSicher(){ return activeIdx().every(i=>mastery(cardState(i))==="sicher"); }

// Matching
function normalize(s){ return (s||"").toLowerCase().trim().replace(/\(.*?\)/g,"").replace(/^to\s+/,"").replace(/^(der|die|das|the|a|an)\s+/,"").replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss").replace(/[.,!?;:]/g,"").replace(/\s+/g," ").trim(); }
function matches(input,sol){ const n=normalize(input); if(!n)return false; const parts=sol.split(/[;/]/).map(x=>x.replace(/\bhier:\s*/,"")); const vs=[]; parts.forEach(p=>{ vs.push(normalize(p)); p.split(",").forEach(z=>vs.push(normalize(z))); }); return vs.filter(Boolean).some(v=>v===n); }

// Progress + backup + corrections
function screenProgress(){ if(!S||!S.settings){route();return;} const st=stats();
  show(`<div class="card">${greetHtml()}<h2>Fortschritt</h2>
    <div class="ringwrap" style="margin:var(--space-3) 0"><div class="ring" style="--p:${st.pct}"><div>${st.pct}%</div></div>
    <div><p><b>${st.sicher}</b> sicher · <b>${st.ueben}</b> am Üben · <b>${st.neu}</b> noch neu zu lernen</p>
    <p class="small muted">Richtung: ${S.settings.dir==="en2de"?"EN→DE":"DE→EN"} · Streak: 🔥 ${S.streak}</p>
    ${(fullListSicher()||extraStats().seen>0)?(()=>{const b=extraStats();return `<p class="small muted">🏅 Extra-Wortschatz: ${b.sicher} sicher · ${b.seen} begonnen · ${b.total} gesamt</p>`;})():""}</div></div>
    <button class="btn sec block" id="corr">✎ Korrekturen exportieren (${(S.corrections||[]).length})</button>
    <div class="row" style="margin-top:var(--space-2)"><button class="btn ghost" id="exp">Sicherung exportieren</button><button class="btn ghost" id="imp">Sicherung laden</button></div>
    <input type="file" id="impf" class="hidden" accept="application/json">
    <button class="btn ghost block" id="reset" style="margin-top:var(--space-2)">Diesen Plan zurücksetzen</button>
    <button class="btn block" id="back" style="margin-top:var(--space-2)">Zurück</button></div>`);
  $("#back").onclick=screenHome; $("#exp").onclick=exportBackup; $("#imp").onclick=()=>$("#impf").click(); $("#impf").onchange=importBackup; $("#corr").onclick=exportCorrections;
  $("#reset").onclick=()=>{ if(confirm("Fortschritt dieser Stufe löschen?")){ const lv=S.settings.level; Object.keys(S.cards).forEach(k=>{ if(k.startsWith(lv+":"))delete S.cards[k]; }); S.done={};S.bonus={};S.newLog={};S.shownMiles=[];S.streak=0;S.lastDate=null; saveState(); route(); } };
}
function exportBackup(){ const blob=new Blob([JSON.stringify({pid:PID,name:(profiles().find(p=>p.id===PID)||{}).name,state:S})],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="vokabel-booster-sicherung.json"; a.click(); }
function importBackup(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ const o=JSON.parse(r.result); S=o.state; saveState(); alert("Sicherung geladen."); route(); }catch(err){ alert("Datei konnte nicht gelesen werden."); } }; r.readAsText(f); }
function exportCorrections(){ const c=S.corrections||[]; if(!c.length){ alert("Noch keine Korrekturen gemeldet."); return; }
  const lines=c.map((x,i)=>`${i+1}. [${x.level}/${x.dir}] ${x.en} = ${x.de}\n   Beispiel: ${x.ex||"-"}\n   Meldung: ${x.note}  (${x.date})`);
  const blob=new Blob(["Korrektur-Meldungen Vokabel-Booster\n\n"+lines.join("\n\n")],{type:"text/plain"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="vokabel-korrekturen.txt"; a.click(); }

// Confetti
function confetti(){ const c=$("#cf"),ctx=c.getContext("2d"); c.width=innerWidth;c.height=innerHeight;
  const cols=["#7E3B34","#9A5A60","#E4C98A","#3E322A","#EFDAD6"],P=[];
  for(let i=0;i<90;i++)P.push({x:Math.random()*c.width,y:-20-Math.random()*c.height*0.3,vx:(Math.random()-.5)*3,vy:2+Math.random()*3,s:4+Math.random()*5,col:cols[i%cols.length],a:1});
  let f=0;(function anim(){ f++; ctx.clearRect(0,0,c.width,c.height); P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.03;p.a-=0.006;ctx.globalAlpha=Math.max(0,p.a);ctx.fillStyle=p.col;ctx.fillRect(p.x,p.y,p.s,p.s);}); if(f<140)requestAnimationFrame(anim); else ctx.clearRect(0,0,c.width,c.height); })(); }

// utils
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function fmt(iso){ return new Date(iso+"T00:00").toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"}); }

// nav
$("#brand").onclick=()=>screenWelcome();
$("#navInfo").onclick=()=>screenWelcome();
$("#navProgress").onclick=()=>{ if(PID){loadState(); (S&&S.settings)?screenProgress():route();} };
$("#navAdjust").onclick=()=>{ if(PID){loadState(); (S&&S.settings&&S.plan)?screenAdjust():route();} };
$("#navProfile").onclick=screenProfiles;
route();
</script>
</body>
